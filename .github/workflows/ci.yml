name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig 0.16.0
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0

    - name: Check formatting
      run: zig fmt --check src/

    - name: Build
      run: zig build

    - name: Run tests
      run: zig build test

    - name: Build release
      run: zig build -Doptimize=ReleaseSafe

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mowen-cli-${{ matrix.os }}
        path: |
          zig-out/bin/mowen-cli*
          README.md
        retention-days: 7

  lint:
    name: Code Quality
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Zig 0.16.0
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0

    - name: Check formatting
      run: zig fmt --check src/ tests/

    - name: Build debug
      run: zig build
