name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.16.0

    - name: Build
      run: zig build

    - name: Run tests
      run: zig build test

    - name: Build release
      run: zig build -Doptimize=ReleaseSafe

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mowen-cli-${{ matrix.os }}
        path: |
          zig-out/bin/mowen-cli*
          config.example.json
          README.md
          CONFIG.md
        retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.16.0

    - name: Check formatting
      run: zig fmt --check src/ tests/

    - name: Build with all warnings
      run: zig build -Doptimize=Debug
