name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp zig-out/bin/mowen-cli${{ matrix.ext }} dist/mowen-cli-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mowen-cli-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
